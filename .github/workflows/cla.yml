name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const allowlist = new Set([
              context.repo.owner,
              'dependabot[bot]',
              'renovate[bot]',
              'github-actions[bot]',
              'release-plz[bot]',
            ]);
            const signText = 'I have read the CLA Document and I hereby sign the CLA';
            const claUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CLA.md`;
            const signaturesPath = 'signatures/cla.json';
            const signaturesBranch = 'cla-signatures';
            const { owner, repo } = context.repo;

            let prNumber;
            let pr;
            if (context.eventName === 'issue_comment') {
              if (!context.payload.issue.pull_request) return;
              if (context.payload.comment.body.trim() !== signText) return;
              prNumber = context.payload.issue.number;
              pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
              if (context.payload.comment.user.login !== pr.user.login) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: `Only the PR author (@${pr.user.login}) can sign this CLA.`,
                });
                return;
              }
            } else {
              prNumber = context.payload.pull_request.number;
              pr = context.payload.pull_request;
            }

            const author = pr.user.login;
            const setStatus = async (state, description) => github.rest.repos.createCommitStatus({
              owner, repo, sha: pr.head.sha, state, context: 'CLA', description,
            });
            if (allowlist.has(author)) {
              await setStatus('success', 'Allowlisted contributor');
              return;
            }

            let signatures = [];
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo, path: signaturesPath, ref: signaturesBranch,
              });
              const content = JSON.parse(Buffer.from(data.content, 'base64').toString());
              signatures = content.signedContributors || [];
            } catch {
              // The signature branch is created on the first accepted signature.
            }

            let hasSigned = signatures.some(signature => signature.login === author);
            if (context.eventName === 'issue_comment' && !hasSigned) {
              signatures.push({
                login: author,
                signed_at: new Date().toISOString(),
                pr: prNumber,
              });

              let branchExists = true;
              try {
                await github.rest.git.getRef({ owner, repo, ref: `heads/${signaturesBranch}` });
              } catch {
                branchExists = false;
                const defaultBranch = (await github.rest.repos.get({ owner, repo })).data.default_branch;
                const { data: ref } = await github.rest.git.getRef({
                  owner, repo, ref: `heads/${defaultBranch}`,
                });
                await github.rest.git.createRef({
                  owner, repo, ref: `refs/heads/${signaturesBranch}`, sha: ref.object.sha,
                });
              }

              let fileSha;
              if (branchExists) {
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner, repo, path: signaturesPath, ref: signaturesBranch,
                  });
                  fileSha = data.sha;
                } catch {
                  // The branch can exist before its first signature file.
                }
              }
              const params = {
                owner,
                repo,
                path: signaturesPath,
                message: `chore: enregistrer la signature CLA de ${author} (#${prNumber})`,
                content: Buffer.from(`${JSON.stringify({ signedContributors: signatures }, null, 2)}\n`).toString('base64'),
                branch: signaturesBranch,
              };
              if (fileSha) params.sha = fileSha;
              await github.rest.repos.createOrUpdateFileContents(params);
              hasSigned = true;
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body: `Thank you @${author}; your CLA is recorded.`,
              });
            }

            if (hasSigned) {
              await setStatus('success', 'CLA signed');
              return;
            }
            await setStatus('pending', 'CLA signature required');
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: [
                `Thank you for contributing. Please read the [Contributor License Agreement](${claUrl}).`,
                '',
                'To sign it, post a comment containing exactly:',
                '',
                `> ${signText}`,
              ].join('\n'),
            });
