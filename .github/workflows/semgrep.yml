name: Semgrep SAST

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/semgrep.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/semgrep.yml"
  schedule:
    - cron: "0 6 * * 3"

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: semgrep/semgrep:1.144.0
    steps:
      - uses: actions/checkout@v6
      - name: Scan Rust sources
        run: semgrep scan --config auto --sarif --output semgrep-results.sarif src/
        env:
          SEMGREP_RULES: >-
            p/rust
            p/secrets
            p/owasp-top-ten
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
