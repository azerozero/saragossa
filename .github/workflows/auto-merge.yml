name: Auto-merge on green CI

# Active l'auto-merge des PR étiquetées `automerge` après le gate Rust. GitHub
# attend ensuite tous les checks requis, notamment le CLA et les scans SAST.

on:
  workflow_run:
    workflows: [Rust]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Merge labeled PRs matching the green head
        run: |
          # shellcheck disable=SC2016 # $sha est une variable jq, pas shell.
          gh pr list --repo "$REPO" --state open --label automerge \
            --json number,headRefOid \
            --jq --arg sha "$HEAD_SHA" '.[] | select(.headRefOid==$sha) | .number' \
            | while read -r pr; do
                echo "Merging PR #${pr} (head $HEAD_SHA, CI verte)"
                gh pr merge --repo "$REPO" --auto --merge "${pr}" || echo "Skip PR #${pr}"
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
