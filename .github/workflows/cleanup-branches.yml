name: Cleanup stale branches

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: cleanup-branches
  cancel-in-progress: false

jobs:
  delete-pr-branch:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged repository branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const protectedNames = new Set(['main', 'master', 'develop', 'release']);
            const protectedPrefixes = ['release/', 'hotfix/', 'dependabot/'];
            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) return;
            if (protectedNames.has(branch)) return;
            if (protectedPrefixes.some(prefix => branch.startsWith(prefix))) return;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted ${branch}`);
            } catch (error) {
              console.log(`Could not delete ${branch}: ${error.message}`);
            }

  sweep-release-branches:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged release-plz branches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: branches } = await github.rest.repos.listBranches({
              owner, repo, per_page: 100,
            });
            for (const branch of branches) {
              if (!branch.name.startsWith('release-plz-')) continue;
              try {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner, repo, base: 'main', head: branch.name,
                });
                if (comparison.ahead_by !== 0) continue;
                await github.rest.git.deleteRef({
                  owner, repo, ref: `heads/${branch.name}`,
                });
                console.log(`Deleted ${branch.name}`);
              } catch (error) {
                console.log(`Skipped ${branch.name}: ${error.message}`);
              }
            }
