name: Security Audit (daily)

# cargo audit sur cron quotidien : les CVE publiées entre deux modifications
# du repo sont détectées sous 24 h même sans push (le job supply-chain de
# rust.yml ne tourne que sur PR/push). Pattern repris de grob.

on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: audit-cron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo audit (scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
