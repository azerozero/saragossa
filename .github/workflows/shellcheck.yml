name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - "**.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.sh"
      - ".github/workflows/shellcheck.yml"

permissions: read-all

concurrency:
  group: shellcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - name: Lint tracked shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' -t scripts < <(git ls-files -z '*.sh')
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No tracked shell scripts."
            exit 0
          fi
          shellcheck --version
          shellcheck -x --severity=warning "${scripts[@]}"
