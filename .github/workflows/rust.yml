name: Rust

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: fmt, clippy, build, tests
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Rust toolchain
        run: |
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --features metal,devtools
      - name: Build
        run: cargo build --features metal,devtools
      - name: Tests
        run: cargo test --features metal,devtools

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Rust toolchain
        run: rustup default stable
      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit
      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null || cargo install cargo-audit --locked
      - name: Vulnerabilities
        run: cargo audit

  dependency-policy:
    name: cargo deny, machete
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Rust toolchain
        run: rustup default stable
      - name: Install policy tools
        run: |
          command -v cargo-deny >/dev/null || cargo install cargo-deny --locked
          command -v cargo-machete >/dev/null || cargo install cargo-machete --locked
      - name: Dependency policy
        run: cargo deny check
      - name: Unused dependencies
        run: cargo machete
