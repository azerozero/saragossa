name: Docs Lint

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "llms.txt"
      - ".markdownlint.json"
      - ".lycheeignore"
      - ".github/workflows/docs-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "llms.txt"
      - ".markdownlint.json"
      - ".lycheeignore"
      - ".github/workflows/docs-lint.yml"

permissions: read-all

concurrency:
  group: docs-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            CLA.md
            AGENTS.md
            CLAUDE.md
          config: .markdownlint.json

  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ hashFiles('README.md', 'CLA.md', 'AGENTS.md', 'CLAUDE.md') }}
          restore-keys: lychee-
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --accept 200,204,206,301,302,303,307,308,403,429
            README.md CLA.md AGENTS.md CLAUDE.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
